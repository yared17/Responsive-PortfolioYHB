<section id="public-repositories" class="portfolio-section">
    <h2>My Public Repositories</h2>
    <div id="repo-grid" class="repo-grid">
        <!-- JavaScript will dynamically insert repositories here -->
    </div>
</section>
<script>
    const fetchPublicRepositories = async () => {
        const response = await fetch('https://api.github.com/users/DevCop95/repos');
        const repos = await response.json();
        const repoGrid = document.getElementById('repo-grid');

        repos.forEach(repo => {
            const repoElement = document.createElement('div');
            repoElement.className = 'repo-item';
            repoElement.innerHTML = `<a href="${repo.html_url}" target="_blank">${repo.name}</a>`;
            repoGrid.appendChild(repoElement);
        });
    };

    document.addEventListener('DOMContentLoaded', fetchPublicRepositories);
</script>
<style>
.portfolio-section { margin-top: 20px; }
.repo-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.repo-item { background: #f4f4f4; padding: 10px; border-radius: 5px; }
.repo-item a { text-decoration: none; color: #333; }
</style>
